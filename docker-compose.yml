version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/langfuse
      - NEXTAUTH_SECRET=c18e154fa94b150937a00f2e0325b39401b58ea93c802a468c35d692ba5c0768
      - SALT=f10c6606a20bdff6384dbf38d38407817b38426ba2494cd40a498b8242ea8806
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
      - ./data:/data
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LANGFUSE_HOST=http://langfuse:3000
    depends_on:
      - qdrant
      - db
      - langfuse

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
